<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weitere Spiele</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            /* Hintergrund exakt wie im Master-Fullscreen des Hauptspiels */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .master-fullscreen {
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            height: 100%;
            width: 100%;
        }

        .master-fs-header {
            font-size: 38px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #facc15;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .master-fs-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
            padding-bottom: 100px; /* Platz für den Footer */
        }

        .game-item {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            gap: 15px;
        }

        .game-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background-color: #3b4c73;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: inset 2px 2px 5px rgba(255, 255, 255, 0.2), inset -2px -2px 5px rgba(0, 0, 0, 0.4);
        }

        .game-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 22px;
            font-weight: bold;
            color: white;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .game-desc {
            font-size: 14px;
            color: #a9b7d6;
            line-height: 1.3;
        }

        .action-btn {
            background-color: #68cd56;
            color: white; 
            border: none; 
            padding: 12px 0;
            width: 100px; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer;
            box-shadow: 0 4px 0 #4ab038;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .action-btn:active { 
            transform: translateY(4px);
            box-shadow: 0 0 0 #4ab038; 
        }

        .master-fs-footer { 
            position: fixed; 
            bottom: 40px; 
            left: 40px; 
            z-index: 10;
        }

        .btn-fs-back {
            background-color: #EE5253;
            color: white; 
            border: none; 
            padding: 16px 32px;
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 20px; 
            cursor: pointer;
            box-shadow: 0 6px 0 #b33939, 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-fs-back:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #b33939, 0 4px 10px rgba(0,0,0,0.4);
        }
        
        /* Scrollbar Styling für die Liste */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div class="master-fullscreen">
        <div class="master-fs-header">Weitere Spiele</div>
        
        <div class="master-fs-content">
            <div class="game-item">
                <div class="game-icon" style="background-color: #e74c3c;">🐍</div>
                <div class="game-info">
                    <div class="game-title">Snake Master</div>
                    <div class="game-desc">Der Retro-Klassiker im modernen Design.</div>
                </div>
                <button class="action-btn" onclick="alert('Spiel startet demnächst!')">Spielen</button>
            </div>

            <div class="game-item">
                <div class="game-icon" style="background-color: #f39c12;">🧱</div>
                <div class="game-info">
                    <div class="game-title">Tetris Pro</div>
                    <div class="game-desc">Staple die Blöcke und knacke den Highscore.</div>
                </div>
                <button class="action-btn" onclick="alert('Spiel startet demnächst!')">Spielen</button>
            </div>

            <div class="game-item">
                <div class="game-icon" style="background-color: #9b59b6;">🏓</div>
                <div class="game-info">
                    <div class="game-title">Neon Pong</div>
                    <div class="game-desc">Rasante Matches im coolen Neon-Look.</div>
                </div>
                <button class="action-btn" onclick="alert('Spiel startet demnächst!')">Spielen</button>
            </div>
        </div>

        <div class="master-fs-footer">
            <button class="btn-fs-back" id="btn-back">
                <svg viewBox="0 0 24 24" fill="white" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                Zurück
            </button>
        </div>
    </div>

    <script>
        // Die Zurück-Taste leitet den Nutzer genau zur vorherigen Position zurück
        document.getElementById('btn-back').addEventListener('click', () => {
            window.history.back();
        });
    </script>
</body>
</html>
